# Serves the built SPA and proxies the backend API + SSE stream, mirroring
# the dev-server proxy paths in vite.config.ts (spec section 23).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API + SSE routes -> backend service (docker-compose network DNS name).
    location ~ ^/(runs|companies|corpus|evals|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;         # required so SSE events aren't batched
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
